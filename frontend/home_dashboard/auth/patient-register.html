<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Registration – Meditrack</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <div class="card card--auth">
        <div class="card-top">
          <a class="btn-back" href="../index.html">Back</a>
          <div class="brand-inline">
            <span class="brand-mark">M</span>
            <span>Meditrack</span>
          </div>
        </div>

        <div class="card-header">
          <h2 class="title">Patient Registration</h2>
          <p class="helper">Create your account to access real-time health monitoring.</p>
        </div>

        <div class="card-illustration">
          <img src="../assets/patient-register.png" alt="AI cartoon doctors and patients" />
        </div>

        <form action="/patient/register" method="POST">
          <div class="row">
            <label for="fullName">Full Name</label>
            <input
              id="fullName"
              name="fullName"
              type="text"
              placeholder="Enter your full name"
              required
            />
          </div>
          

            <div class="row">
              <label for="age">Age</label>
              <input id="age" name="age" type="number" min="0" placeholder="Enter your age" required />
            </div>

            <div class="row">
              <label for="gender">Gender</label>
              <select id="gender" name="gender" required>
                <option value="" selected disabled>Select gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
              </select>
            </div>

            <div class="row">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="you@example.com" required />
            </div>

            <div class="row">
              <label for="phone">Phone Number</label>
              <input
                id="phone"
                name="phone"
                type="tel"
                placeholder="Enter phone number"
                required
                data-phone-input
              />
            </div>

            <div class="row">

              <label for="password">Password</label>
              <input
                id="password"
                name="password"
                type="password"
                placeholder="Create a password"
                required
              />
            </div>
            <br>
          <div>
            <button class="btn btn-primary" type="submit">Register</button>
          </div>
        </form>

        <p class="note">
          Already have an account? <a href="patient-login.html">Login</a>
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
