<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Login – Meditrack</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <div class="card card--auth">
        <div class="card-top">
          <a class="btn-back" href="../index.html">Back</a>
          <div class="brand-inline">
            <span class="brand-mark">M</span>
            <span>Meditrack</span>
          </div>
        </div>

        <div class="card-header">
          <h2 class="title">Patient Login</h2>
          <p class="helper">Sign in to view your monitoring summary.</p>
        </div>

        <div class="card-illustration">
          <img src="../assets/patient-login.png" alt="AI cartoon doctors and patients" />
        </div>

        <form class="form">
          <!-- <div class="row">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" placeholder="Enter your username " required />
          </div> -->
          <div class="row">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="you@example.com"
              required
            />
          </div>
          <div>
            <label for="password">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Enter your password"
              required
            />
          </div>
          <button class="btn btn-primary" type="submit">Login</button>
        </form>

        <p class="note">
          Don't have an account? <a href="patient-register.html">Register</a>
        </p>
      </div>
    </div>
  </body>
</html>
