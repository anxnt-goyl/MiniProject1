<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Registration – Meditrack</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <div class="card card--auth">
        <div class="card-top">
          <a class="btn-back" href="../index.html">Back</a>
          <div class="brand-inline">
            <span class="brand-mark">M</span>
            <span>Meditrack</span>
          </div>
        </div>

        <div class="card-header">
          <h2 class="title">Doctor Registration</h2>
          <p class="helper">Register as a doctor to monitor patients and receive alerts.</p>
        </div>

        <div class="card-illustration">
          <img src="../assets/doctor-register.png" alt="AI cartoon doctors and patients" />
        </div>

        <form action="/doctor/register" method="POST">
            <div class="row">
              <label for="fullName">Full Name</label>
              <input
                id="fullName"
                name="fullName"
                type="text"
                placeholder="Enter your full name"
                required
              />
            </div>

            <div class="row">
              <label for="specialization">Doctor Specialization</label>
              <select id="specialization" name="specialization" required>
                <option value="" selected disabled>Select specialization</option>
                <option>Gynecologist</option>
                <option>Surgeon</option>
                <option>Cardiologist</option>
                <option>General Physician</option>
                <option>Other</option>
              </select>
            </div>

            <div class="row">
              <label for="degree">Degree Name</label>
              <input id="degree" name="degree" type="text" placeholder="e.g., MBBS, MD" required />
            </div>

            <div class="row">
              <label for="hospital">Hospital Name</label>
              <input id="hospital" name="hospital" type="text" placeholder="Enter hospital name" required />
            </div>

            <div class="row">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="you@hospital.com" required />
            </div>

            <div class="row">
              <label for="phone">Phone Number</label>
              <input
                id="phone"
                name="phone"
                type="tel"
                placeholder="Enter phone number"
                required
                data-phone-input
              />
            </div>
            <div class="row">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" placeholder="Create a password" required />
            </div>

            <div class="row">
              <label for="username">Username</label>
              <input id="username" name="username" type="text" placeholder="Choose a username" required />
            </div>
        </form>

        <p class="note">
          Already have an account? <a href="doctor-login.html">Login</a>
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
