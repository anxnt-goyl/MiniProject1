<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital Registration – Meditrack</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <div class="card card--auth">
        <div class="card-top">
          <a class="btn-back" href="../index.html">Back</a>
          <div class="brand-inline">
            <span class="brand-mark">M</span>
            <span>Meditrack</span>
          </div>
        </div>

        <div class="card-header">
          <h2 class="title">Hospital Registration</h2>
          <p class="helper">Providing trusted healthcare with experienced doctors and compassionate care for every patient.</p>
        </div>

        <div class="card-illustration">
          <img src="../assets/doctor-register.png" alt="AI cartoon doctors and patients" />
        </div>

        <form class="form">

            <div>
              <label for="email">Hospital Name</label>
            <input type="text" placeholder="Hospital Name" required>
            </div>

            <div>
              <label for="email">Address</label>
<input type="text" placeholder="Address">
<input type="text" placeholder="City">
<input type="text" placeholder="State">
<input type="text" placeholder="Pincode">
            </div>

            <div class="row">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="you@hospital.com" required />
            </div>

            <div class="row">
              <label for="phone">Phone Number</label>
              <input
                id="phone"
                name="phone"
                type="tel"
                placeholder="Enter phone number"
                required
                data-phone-input
              />
            </div>
            <div class="row">
              <label for="password">Username</label>
              <input id="password" name="password" type="password" placeholder="Create a password" required />
            </div>

            <div class="row">
              <label for="password">Password</label>
              <input id="password" name="password" type="text" placeholder="Choose a username" required />
            </div>
            <div class="row">
              <label for="confirmpassword">Confirm Password</label>
              <input id="confirmPassword" name="confirmpassword" type="text" placeholder="Choose a username" required />
            </div>
            <div>
            <button class="btn btn-primary" type="submit">Register</button>
            </div>
        </form>

        <p class="note">
          Already have an account? <a href="doctor-login.html">Login</a>
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
